<app-header></app-header>
<app-carrusell></app-carrusell>

<div class="container-section">
    <router-outlet></router-outlet>

        <div class="container text-center text-white">
            <div class="container-home py-2">
                <h3 class="mt-3">MENSAJES DE USUARIOS</h3>
                <div class="container">
                    <div class="container-home-in">
                        <div class="container text-center text-white mb-3">
                            <br>
                            <table class="table mt-3 text-white">
                                <thead>
                                    <tr>
                                        <th>#ID</th>
                                        <th>E-MAIL</th>
                                        <th>FECHA</th>
                                        <th>MENSAJE</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let msj of mensajes">
                                        <td>{{ msj.id }}</td>
                                        <td>{{ msj.email }}</td>
                                        <td>{{ msj.createAt |date: 'dd/MM/yyyy' }}</td>
                                        <td>{{ msj.mensaje }}</td>
                                        <td><button class="btn btn-outline-danger border-btn-blog">
                                            <i class="fas fa-trash-alt"></i></button></td>
                                    </tr>
                                    <tr class="text-center">
                                        <td><i class="fas fa-angle-double-left" (click)="rewind()"></i></td>
                                        <td colspan="3">
                                          <span *ngFor="let pagina of totalPages; let i = index">
                                            <a style="cursor: pointer; padding-left: 7px; color: white;" (click)="setPage(i)" [ngClass]="{ 'text-primary' : i === page }">{{ i+1 }}</a>
                                          </span>
                                        </td>
                                        <td><i class="fas fa-angle-double-right" (click)="forward()"></i></td>
                                      </tr>
                                </tbody>
                            </table>
                            <button class="btn btn-outline-primary border-btn-blog mt-2 mb-3" [routerLink]="['']">
                                <i class="fas fa-sign-out-alt"></i>  SALIR</button>
                        </div>
                    </div>
                </div>
              
            </div>
        </div>
    
</div>

<app-footer></app-footer>
